<script>

function generate(){

let name=document.getElementById("name").value;
let result=document.getElementById("result");

result.innerHTML="";

let symbols1=["★","✿","꧁","♛","☬","⚡","♡","♔","♚","✧","✦","✩","✪","✯","✰","✵","✶","✹","✺","❖","✬","✭","✮","✯","✰"];
let symbols2=["★","✿","꧂","♛","☬","⚡","♡","♔","♚","✧","✦","✩","✪","✯","✰","✵","✶","✹","✺","❖","✬","✭","✮","✯","✰"];

let fonts=[
name,
name.toUpperCase(),
name.toLowerCase(),
"𝒜"+name,
"𝓕"+name,
"𝕯"+name,
"𝔊"+name,
"𝕊"+name,
"𝕿"+name,
"𝓢"+name,
"𝓖"+name,
"𝔽"+name,
"𝕻"+name,
"𝕷"+name,
"𝔸"+name
];

for(let i=0;i<1000;i++){

let s1=symbols1[Math.floor(Math.random()*symbols1.length)];
let s2=symbols2[Math.floor(Math.random()*symbols2.length)];
let f=fonts[Math.floor(Math.random()*fonts.length)];

let style=s1+" "+f+" "+s2;

let div=document.createElement("div");
div.className="box";
div.innerText=style;

result.appendChild(div);

}

}

</script>
