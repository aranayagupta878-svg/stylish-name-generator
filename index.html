<!DOCTYPE html>
<html>
<head>
<title>Stylish Name Generator</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

input{
padding:12px;
font-size:18px;
width:80%;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:18px;
}

.card{
background:white;
margin:10px;
padding:12px;
border-radius:10px;
font-size:22px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
cursor:pointer;
}
</style>
</head>

<body>

<h2>Stylish Name Generator</h2>

<input type="text" id="name" placeholder="Enter your name">
<br><br>

<button onclick="generate()">Generate Stylish Name</button>

<div id="result"></div>

<script>

const fonts = [

["a","b","c","d","e","f","g","h","i","j","k","l","m","n","o","p","q","r","s","t","u","v","w","x","y","z"],
["𝓪","𝓫","𝓬","𝓭","𝓮","𝓯","𝓰","𝓱","𝓲","𝓳","𝓴","𝓵","𝓶","𝓷","𝓸","𝓹","𝓺","𝓻","𝓼","𝓽","𝓾","𝓿","𝔀","𝔁","𝔂","𝔃"],
["𝕒","𝕓","𝕔","𝕕","𝕖","𝕗","𝕘","𝕙","𝕚","𝕛","𝕜","𝕝","𝕞","𝕟","𝕠","𝕡","𝕢","𝕣","𝕤","𝕥","𝕦","𝕧","𝕨","𝕩","𝕪","𝕫"],
["𝖆","𝖇","𝖈","𝖉","𝖊","𝖋","𝖌","𝖍","𝖎","𝖏","𝖐","𝖑","𝖒","𝖓","𝖔","𝖕","𝖖","𝖗","𝖘","𝖙","𝖚","𝖛","𝖜","𝖝","𝖞","𝖟"],
["𝗮","𝗯","𝗰","𝗱","𝗲","𝗳","𝗴","𝗵","𝗶","𝗷","𝗸","𝗹","𝗺","𝗻","𝗼","𝗽","𝗾","𝗿","𝘀","𝘁","𝘂","𝘃","𝘄","𝘅","𝘆","𝘇"],
["𝘢","𝘣","𝘤","𝘥","𝘦","𝘧","𝘨","𝘩","𝘪","𝘫","𝘬","𝘭","𝘮","𝘯","𝘰","𝘱","𝘲","𝘳","𝘴","𝘵","𝘶","𝘷","𝘸","𝘹","𝘺","𝘻"]

];

function convert(text,font){

let normal="abcdefghijklmnopqrstuvwxyz";
let result="";

for(let i=0;i<text.length;i++){

let char=text[i].toLowerCase();
let index=normal.indexOf(char);

if(index!=-1){
result+=font[index];
}else{
result+=text[i];
}

}

return result;

}

function generate(){

let name=document.getElementById("name").value;

let html="";

fonts.forEach(font=>{

let styled=convert(name,font);

html+=`<div class="card">꧁${styled}꧂</div>`;
html+=`<div class="card">★${styled}★</div>`;
html+=`<div class="card">『${styled}』</div>`;
html+=`<div class="card">⚡${styled}⚡</div>`;
html+=`<div class="card">♛${styled}♛</div>`;

});

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
