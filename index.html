<!DOCTYPE html>
<html>
<head>
<title>Stylish Name Generator</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

input{
padding:12px;
font-size:18px;
width:80%;
}

button{
padding:10px 20px;
font-size:18px;
margin-top:10px;
}

.box{
background:white;
margin:8px;
padding:12px;
border-radius:10px;
font-size:22px;
}
</style>

</head>

<body>

<h2>Stylish Name Generator</h2>

<input id="name" placeholder="Enter your name">
<br><br>

<button onclick="generate()">Generate Stylish Name</button>

<div id="result"></div>

<script>

function generate(){

let name=document.getElementById("name").value;
let result=document.getElementById("result");

result.innerHTML="";

let symbols=["★","✿","꧁","꧂","♛","☬","⚡","♡","♔","♚","✧","✦","✩","✪","✯"];

for(let i=0;i<500;i++){

let s1=symbols[Math.floor(Math.random()*symbols.length)];
let s2=symbols[Math.floor(Math.random()*symbols.length)];

let style=s1+" "+name+" "+s2;

let div=document.createElement("div");
div.className="box";
div.innerText=style;

result.appendChild(div);

}

}

</script>

</body>
</html>
